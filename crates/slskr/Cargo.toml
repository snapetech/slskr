[package]
name = "slskr"
version = "0.0.0"
description = "Bundled Soulseek-network client/server app"
keywords = ["slsk", "soulseek", "client", "server", "rust"]
categories = ["command-line-utilities", "network-programming"]
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
slskr-client = { version = "0.0.0", path = "../slskr-client" }
slskr-cli = { version = "0.0.0", path = "../slskr-cli" }
tokio = { version = "1", features = ["io-util", "macros", "net", "rt-multi-thread", "sync", "time", "signal"] }
toml = "0.8"
sqlx = { version = "0.7", features = ["sqlite", "runtime-tokio-rustls", "chrono", "uuid"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
reqwest = { version = "0.11", features = ["json"] }
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
flate2 = "1"  # Phase 11: Response compression
# Phase 8: Axum framework migration
axum = { version = "0.7", features = ["macros", "multipart"] }
tower = { version = "0.4", features = ["util"] }
tower-http = { version = "0.5", features = ["cors", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
# Phase 9: WebSocket support
tokio-tungstenite = "0.21"

[lints]
workspace = true
