name: Live Parity

env:
  WASM_BINDGEN_CLI_VERSION: 0.2.120

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read

concurrency:
  group: live-parity-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rust-ui-and-slskd-api:
    name: Rust UI and slskd API parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # Swatinem/rust-cache@v2
      - name: Prefer rustup toolchain binaries
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install system tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
          "$(rustup which cargo)" install wasm-bindgen-cli --version "$WASM_BINDGEN_CLI_VERSION" --locked --force
      - name: Install web dependencies
        run: npm --prefix web ci
      - name: Install Playwright browsers
        run: npm --prefix web exec playwright install --with-deps chromium
      - name: Rust web UI headless parity audit
        run: node scripts/audit-rust-web-ui.mjs
      - name: slskd API automation compatibility smoke
        env:
          SLSKR_SLSKD_API_SMOKE_DIR: target/slskd-api-smoke
          SLSKR_SLSKD_API_SMOKE_TOKEN: live-parity-${{ github.run_id }}-${{ github.run_attempt }}
        run: scripts/run-slskd-api-compat-smoke.sh
      - name: Upload parity artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7.0.1
        with:
          name: live-parity-${{ github.run_id }}
          path: |
            target/ux-audit/**
            target/slskr-web/**
            target/slskd-api-smoke/**
          if-no-files-found: ignore

  credentialed-live-interop:
    name: Credentialed public live interop
    runs-on: ubuntu-latest
    env:
      SLSKR_LIVE_INTEROP_ENV: ${{ secrets.SLSKR_LIVE_INTEROP_ENV }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # Swatinem/rust-cache@v2
      - name: Prefer rustup toolchain binaries
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - name: Prepare live credentials
        id: live-creds
        shell: bash
        run: |
          mkdir -p target/live-interop
          if [[ -z "${SLSKR_LIVE_INTEROP_ENV:-}" ]]; then
            printf 'timestamp\tcheck\tstatus\tdetail\n' > target/live-interop/credentialed-live-interop.tsv
            printf '%s\tcredentialed-live-interop\tskipped\tSLSKR_LIVE_INTEROP_ENV secret is not configured\n' "$(date -Is)" >> target/live-interop/credentialed-live-interop.tsv
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "$SLSKR_LIVE_INTEROP_ENV" > target/live-interop/live.env
          chmod 0600 target/live-interop/live.env
          echo "configured=true" >> "$GITHUB_OUTPUT"
      - name: Public live interop matrix
        if: steps.live-creds.outputs.configured == 'true'
        env:
          SLSKR_INTEROP_OUTPUT_DIR: target/live-interop
          SLSKR_LIVE_ENV_FILE: target/live-interop/live.env
        run: scripts/run-live-interop-matrix.sh
      - name: Upload public live interop artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7.0.1
        with:
          name: credentialed-live-interop-${{ github.run_id }}
          path: target/live-interop/**
          if-no-files-found: error
