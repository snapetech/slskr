name: Windows Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "web/**"
      - "dashboard/**"
      - "client-ts/**"
      - ".github/workflows/windows-smoke.yml"

permissions:
  contents: read

jobs:
  rust:
    runs-on: [self-hosted, Windows, X64, packer-windows]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            dashboard/package-lock.json
            client-ts/package-lock.json

      - name: Rust fmt
        run: cargo fmt --all --check

      - name: Rust tests
        run: cargo test --workspace

      - name: WASM check
        run: cargo check -p slskr-web --target wasm32-unknown-unknown

      - name: Web build
        run: |
          npm --prefix web ci
          npm --prefix web run build
