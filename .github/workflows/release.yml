name: Release

env:
  ACTIONLINT_VERSION: v1.7.7
  SLSKR_SECURITY_SCANS_REQUIRED: '1'
  SLSKR_SEMGREP_IMAGE: semgrep/semgrep:1.70.0
  SLSKR_TRIVY_IMAGE: aquasec/trivy:0.50.1

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version label
        required: false
        default: manual
  push:
    tags:
      - 'release-v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            version="$INPUT_VERSION"
            if [[ -z "$version" || "$version" == "manual" ]]; then
              version="manual-${GITHUB_SHA::12}"
            fi
          else
            tag_pattern='^release-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
            if [[ ! "$GITHUB_REF_NAME" =~ $tag_pattern ]]; then
              printf 'Release tags must use release-v<semver>, got %s\n' "$GITHUB_REF_NAME" >&2
              exit 1
            fi
            version="${GITHUB_REF_NAME#release-}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  gate:
    name: Release Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # Swatinem/rust-cache@v2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            dashboard/package-lock.json
            client-ts/package-lock.json
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache-dependency-path: client-go/go.sum
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install workflow and shell linters
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep shellcheck
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --locked
      - name: Run release gate
        run: scripts/run-release-gate.sh

  build:
    name: Build ${{ matrix.name }}
    needs: [version, gate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            apt: ''
          - name: linux-musl-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            apt: musl-tools
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            apt: ''
          - name: macos-x64
            os: macos-14
            target: x86_64-apple-darwin
            apt: ''
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            apt: ''
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            apt: ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # Swatinem/rust-cache@v2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install native packages
        if: matrix.apt != ''
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}
      - name: Build archive
        shell: bash
        env:
          SLSKR_RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: scripts/build-release-archive.sh --target '${{ matrix.target }}'
      - name: Verify archive layout
        shell: bash
        run: scripts/verify-release-artifacts.sh target/dist
      - name: Upload archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: slskr-${{ matrix.name }}
          path: |
            target/dist/slskr-*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/release-v')
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # actions/download-artifact@v4
        with:
          path: artifacts
          pattern: slskr-*
      - name: Prepare assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release/ \;
          scripts/generate-release-manifests.sh release "${{ needs.version.outputs.version }}"
          (cd release && find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.json' \) -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)
          ls -lh release
      - name: Attest release assets
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # actions/attest-build-provenance@v3
        with:
          subject-path: |
            release/*.tar.gz
            release/*.zip
            release/*.json
            release/*.sha256
            release/SHA256SUMS.txt
      - name: Create release notes
        shell: bash
        run: |
          cat > release/RELEASE_NOTES.md <<EOF
          # slskr ${{ needs.version.outputs.version }}

          Binary archives for Linux, macOS, and Windows.

          Verify downloads with \`SHA256SUMS.txt\`.
          EOF
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: slskr ${{ needs.version.outputs.version }}
          body_path: release/RELEASE_NOTES.md
          files: release/*
