name: Release

env:
  CARGO_AUDIT_VERSION: 0.22.1
  ACTIONLINT_VERSION: v1.7.12
  SLSKR_SECURITY_SCANS_REQUIRED: '1'
  SLSKR_SEMGREP_IMAGE: semgrep/semgrep:1.167.0
  SLSKR_TRIVY_IMAGE: aquasec/trivy:0.72.0
  WASM_BINDGEN_CLI_VERSION: 0.2.120

on:
  push:
    tags:
      - 'release-v*'

permissions:
  actions: read
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        shell: bash
        run: |
          tag_pattern='^release-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'
          if [[ ! "$GITHUB_REF_NAME" =~ $tag_pattern ]]; then
            printf 'Release tags must use release-v<semver>, got %s\n' "$GITHUB_REF_NAME" >&2
            exit 1
          fi
          version="${GITHUB_REF_NAME#release-}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  main-ci:
    name: Require Main CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI on release commit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          for _ in {1..120}; do
            run_json="$(
              gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow CI \
                --branch main \
                --commit "$RELEASE_SHA" \
                --limit 1 \
                --json databaseId,status,conclusion,url \
                --jq '.[0] // empty'
            )"

            if [[ -z "$run_json" ]]; then
              printf 'No CI run for %s on main yet; waiting...\n' "$RELEASE_SHA"
              sleep 30
              continue
            fi

            status="$(jq -r '.status' <<<"$run_json")"
            conclusion="$(jq -r '.conclusion // ""' <<<"$run_json")"
            url="$(jq -r '.url' <<<"$run_json")"
            printf 'CI run for %s: %s %s %s\n' "$RELEASE_SHA" "$status" "$conclusion" "$url"

            if [[ "$status" == "completed" && "$conclusion" == "success" ]]; then
              exit 0
            fi

            if [[ "$status" == "completed" ]]; then
              printf 'Release commit CI did not pass: %s\n' "$url" >&2
              exit 1
            fi

            sleep 30
          done

          printf 'Timed out waiting for CI on release commit %s\n' "$RELEASE_SHA" >&2
          exit 1

  gate:
    name: Release Gate
    needs: [version, main-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v6
      - name: Check out frozen controller parity references
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v6
        with:
          repository: snapetech/slskdN
          path: slskdn-reference
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch frozen slskd parity reference
        run: |
          git -C slskdn-reference fetch --no-tags --depth=1 \
            https://github.com/slskd/slskd.git \
            16e5d86ec9a91120f3ef40b85cb22036566b788a
          git -C slskdn-reference cat-file -e \
            '16e5d86ec9a91120f3ef40b85cb22036566b788a^{commit}'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # Swatinem/rust-cache@v2
      - name: Prefer rustup toolchain binaries
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            dashboard/package-lock.json
            client-ts/package-lock.json
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache-dependency-path: client-go/go.sum
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install workflow and shell linters
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep shellcheck
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Restore cargo-audit
        id: cargo-audit-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # actions/cache@v6.1.0
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-${{ runner.arch }}-${{ env.CARGO_AUDIT_VERSION }}
      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: '"$(rustup which cargo)" install cargo-audit --version "$CARGO_AUDIT_VERSION" --locked'
      - name: Install wasm-bindgen CLI
        run: '"$(rustup which cargo)" install wasm-bindgen-cli --version "$WASM_BINDGEN_CLI_VERSION" --locked --force'
      - name: Install Playwright browsers
        run: |
          npm --prefix web ci --allow-git=root --legacy-peer-deps
          npm --prefix web exec playwright install --with-deps chromium
      - name: Run release gate
        env:
          SLSKR_UPSTREAM_GIT_REPO: ${{ github.workspace }}/slskdn-reference
        run: scripts/run-release-gate.sh

  build:
    name: Build ${{ matrix.name }}
    needs: [version, gate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            apt: ''
          - name: linux-musl-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            apt: musl-tools
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            apt: ''
          - name: linux-musl-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            apt: musl-tools
          - name: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            apt: ''
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            apt: ''
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            apt: ''
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # dtolnay/rust-toolchain@stable
        with:
          targets: |
            ${{ matrix.target }}
            wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # Swatinem/rust-cache@v2
      - name: Prefer rustup toolchain binaries
        shell: bash
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Enable long Git paths
        if: runner.os == 'Windows'
        shell: bash
        run: git config --global core.longpaths true
      - name: Select full Perl for vendored OpenSSL
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $perlCandidates = @(
            Get-Command perl.exe -All -ErrorAction SilentlyContinue |
              ForEach-Object Source
            'C:\Strawberry\perl\bin\perl.exe'
          ) | Select-Object -Unique

          $perl = $null
          foreach ($candidate in $perlCandidates) {
            if (-not (Test-Path -LiteralPath $candidate -PathType Leaf)) {
              continue
            }

            & $candidate -MLocale::Maketext::Simple -e 1
            if ($LASTEXITCODE -eq 0) {
              $perl = $candidate
              break
            }
          }

          if (-not $perl) {
            throw 'No Perl installation with Locale::Maketext::Simple is available for vendored OpenSSL'
          }

          "OPENSSL_SRC_PERL=$perl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Vendored OpenSSL will use $perl"
      - name: Install native packages
        if: matrix.apt != ''
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}
      - name: Install wasm-bindgen CLI
        shell: bash
        run: '"$(rustup which cargo)" install wasm-bindgen-cli --version "$WASM_BINDGEN_CLI_VERSION" --locked --force'
      - name: Build archive
        shell: bash
        env:
          SLSKR_RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: scripts/build-release-archive.sh --target '${{ matrix.target }}'
      - name: Verify archive layout
        shell: bash
        run: scripts/verify-release-artifacts.sh target/dist
      - name: Upload archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7.0.1
        with:
          name: slskr-${{ matrix.name }}
          path: |
            target/dist/slskr-*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/release-v')
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v6
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact@v8.0.1
        with:
          path: artifacts
          pattern: slskr-*
      - name: Prepare assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release/ \;
          scripts/generate-release-manifests.sh release "${{ needs.version.outputs.version }}"
          (cd release && find . -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.json' \) -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)
          ls -lh release
      - name: Attest release assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # actions/attest-build-provenance@v4
        with:
          subject-path: |
            release/*.tar.gz
            release/*.zip
            release/*.json
            release/*.sha256
            release/SHA256SUMS.txt
      - name: Create release notes
        shell: bash
        run: |
          cat > release/RELEASE_NOTES.md <<EOF
          # slskr ${{ needs.version.outputs.version }}

          Binary archives for Linux, macOS, and Windows.

          Verify downloads with \`SHA256SUMS.txt\`.
          EOF
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: slskr ${{ needs.version.outputs.version }}
          body_path: release/RELEASE_NOTES.md
          files: release/*
      - name: Trigger downstream package publish
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          echo "Triggering downstream package publish for ${RELEASE_TAG}..."
          gh workflow run release-publish.yml --ref main -f tag="${RELEASE_TAG}"

  discord:
    name: Announce Discord Release
    if: startsWith(github.ref, 'refs/tags/release-v')
    needs: [version, release]
    runs-on: ubuntu-latest
    steps:
      - name: Post release announcement
        shell: bash
        env:
          DISCORD_RELEASE_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          if [[ -z "$DISCORD_RELEASE_WEBHOOK_URL" ]]; then
            echo "DISCORD_RELEASE_WEBHOOK_URL secret is required for release announcements" >&2
            exit 1
          fi
          python - <<'PY' | curl --fail-with-body -H 'Content-Type: application/json' -d @- "$DISCORD_RELEASE_WEBHOOK_URL"
          import json
          import os

          version = os.environ["RELEASE_VERSION"]
          tag = os.environ["RELEASE_TAG"]
          url = os.environ["RELEASE_URL"]
          payload = {
              "content": f"slskr {version} is released: {url}",
              "embeds": [
                  {
                      "title": f"slskr {version}",
                      "url": url,
                      "description": "A new tagged GitHub release is available.",
                      "fields": [
                          {"name": "Tag", "value": tag, "inline": True},
                      ],
                  }
              ],
          }
          print(json.dumps(payload))
          PY
