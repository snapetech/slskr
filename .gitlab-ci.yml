workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

stages:
  - test
  - promote

variables:
  CARGO_TERM_COLOR: always

rust:
  stage: test
  image: rust:1.94-bookworm
  before_script:
    - rustup component add clippy rustfmt
    - rustup target add wasm32-unknown-unknown
  script:
    - cargo fmt --all --check
    - cargo clippy --workspace --all-targets -- -D warnings
    - cargo check -p slskr-web --target wasm32-unknown-unknown
    - cargo test --workspace

go:client:
  stage: test
  image: golang:1.23-bookworm
  script:
    - cd client-go
    - go test ./...

node:web:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key:
      files:
        - web/package-lock.json
    paths:
      - web/.npm/
  before_script:
    - npm --prefix web ci --allow-git=root --legacy-peer-deps --cache web/.npm --prefer-offline
  script:
    - npm --prefix web run lint
    - npm --prefix web test
    - npm --prefix web run build

node:dashboard:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key:
      files:
        - dashboard/package-lock.json
    paths:
      - dashboard/.npm/
  before_script:
    - npm --prefix dashboard ci --cache dashboard/.npm --prefer-offline
  script:
    - npm --prefix dashboard run type-check
    - npm --prefix dashboard run lint
    - npm --prefix dashboard test
    - npm --prefix dashboard run build

node:client-ts:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key:
      files:
        - client-ts/package-lock.json
    paths:
      - client-ts/.npm/
  before_script:
    - npm --prefix client-ts ci --ignore-scripts --cache client-ts/.npm --prefer-offline
  script:
    - npm --prefix client-ts run lint
    - npm --prefix client-ts run build

.github_publication_defaults:
  variables:
    GITHUB_MIRROR_URL: "git@github.com:snapetech/slskr.git"
    GITHUB_REPOSITORY: "snapetech/slskr"

# External publication is intentionally gated on all earlier GitLab stages.
# Set GITHUB_MIRROR_SSH_KEY, GITHUB_TOKEN, and GHCR_TOKEN in GitLab CI as needed.
# OpenBao is the source of truth for downstream publishing creds; the local
# GitLab runner can reach it, so github:sync-secrets refreshes the GitHub
# Actions secrets from OpenBao before the GitHub release is created (the
# release event triggers release-publish.yml on GitHub-hosted runners, which
# cannot reach OpenBao and therefore consume ${{ secrets.* }}). Set BAO_ADDR
# and a masked BAO_TOKEN in GitLab CI for that job.
github:mirror:
  extends: .github_publication_defaults
  stage: promote
  image: alpine:3.21
  before_script:
    - apk add --no-cache git openssh-client
    - eval "$(ssh-agent -s)"
    - printf '%s\n' "$GITHUB_MIRROR_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - test -n "$GITHUB_MIRROR_URL"
    - git remote add github-mirror "$GITHUB_MIRROR_URL"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        git push github-mirror "refs/tags/$CI_COMMIT_TAG:refs/tags/$CI_COMMIT_TAG"
      else
        git push github-mirror "HEAD:$CI_COMMIT_REF_NAME"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG'

github:sync-secrets:
  extends: .github_publication_defaults
  stage: promote
  image: alpine:3.21
  needs: ["github:mirror"]
  before_script:
    - apk add --no-cache curl jq github-cli
  script:
    - test -n "$BAO_ADDR"
    - test -n "$BAO_TOKEN"
    - test -n "$GITHUB_TOKEN"
    - test -n "$GITHUB_REPOSITORY"
    # KV v2 read; values are extracted with jq and piped straight into
    # `gh secret set` (stdin) so they are never printed or kept in env.
    - |
      set -eu
      resp="$(curl -sf -H "X-Vault-Token: $BAO_TOKEN" \
        "$BAO_ADDR/v1/secret/data/slskr/release-publishing")"
      for map in copr_login:COPR_LOGIN copr_token:COPR_TOKEN \
                 dockerhub_username:DOCKERHUB_USERNAME \
                 dockerhub_token:DOCKERHUB_TOKEN; do
        bkey="${map%%:*}"; ghname="${map##*:}"
        printf '%s' "$resp" | jq -er --arg k "$bkey" '.data.data[$k]' \
          | gh secret set "$ghname" --repo "$GITHUB_REPOSITORY"
        echo "set $ghname on $GITHUB_REPOSITORY from OpenBao"
      done
      for map in copr_kerberos_principal:COPR_KERBEROS_PRINCIPAL \
                 copr_kerberos_keytab_b64:COPR_KERBEROS_KEYTAB_B64 \
                 copr_fedora_username:COPR_FEDORA_USERNAME \
                 copr_fedora_password:COPR_FEDORA_PASSWORD \
                 copr_fedora_otp_secret:COPR_FEDORA_OTP_SECRET \
                 aur_ssh_key:AUR_SSH_KEY; do
        bkey="${map%%:*}"; ghname="${map##*:}"
        if printf '%s' "$resp" | jq -e --arg k "$bkey" '.data.data[$k] | values' >/dev/null; then
          printf '%s' "$resp" | jq -er --arg k "$bkey" '.data.data[$k]' \
            | gh secret set "$ghname" --repo "$GITHUB_REPOSITORY"
          echo "set $ghname on $GITHUB_REPOSITORY from OpenBao"
        else
          echo "skipped optional $ghname; OpenBao key $bkey is not present"
        fi
      done
  rules:
    - if: '$CI_COMMIT_TAG'

github:release:
  extends: .github_publication_defaults
  stage: promote
  image:
    name: ghcr.io/cli/cli:2.63.2
    entrypoint: [""]
  needs: ["github:mirror", "github:sync-secrets"]
  script:
    - test -n "$GITHUB_TOKEN"
    - test -n "$GITHUB_REPOSITORY"
    - gh release create "$CI_COMMIT_TAG" --repo "$GITHUB_REPOSITORY" --title "$CI_COMMIT_TAG" --notes "Released from GitLab pipeline $CI_PIPELINE_URL" --verify-tag
  rules:
    - if: '$CI_COMMIT_TAG'
