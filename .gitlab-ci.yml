workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

stages:
  - test

variables:
  CARGO_TERM_COLOR: always

rust:
  stage: test
  image: rust:1.93-bookworm
  before_script:
    - rustup component add clippy rustfmt
    - rustup target add wasm32-unknown-unknown
  script:
    - cargo fmt --all --check
    - cargo clippy --workspace --all-targets -- -D warnings
    - cargo check -p slskr-web --target wasm32-unknown-unknown
    - cargo test --workspace

go:client:
  stage: test
  image: golang:1.23-bookworm
  script:
    - cd client-go
    - go test ./...

node:web:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key:
      files:
        - web/package-lock.json
    paths:
      - web/.npm/
  before_script:
    - npm --prefix web ci --cache web/.npm --prefer-offline
  script:
    - npm --prefix web run lint
    - npm --prefix web test
    - npm --prefix web run build

node:dashboard:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key:
      files:
        - dashboard/package-lock.json
    paths:
      - dashboard/.npm/
  before_script:
    - npm --prefix dashboard ci --cache dashboard/.npm --prefer-offline
  script:
    - npm --prefix dashboard run type-check
    - npm --prefix dashboard run lint
    - npm --prefix dashboard test
    - npm --prefix dashboard run build

node:client-ts:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key:
      files:
        - client-ts/package-lock.json
    paths:
      - client-ts/.npm/
  before_script:
    - npm --prefix client-ts ci --ignore-scripts --cache client-ts/.npm --prefer-offline
  script:
    - npm --prefix client-ts run lint
    - npm --prefix client-ts run build
