apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: slskr

resources:
  - namespace.yaml
  - pvc.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - rbac.yaml
  - servicemonitor.yaml
  - networkpolicy.yaml

replicas:
  - name: slskr-api
    count: 1
