apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: slskr-ingress
  namespace: soulseekr
  labels:
    app: soulseekr
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - slskr.example.com
    secretName: slskr-tls
  rules:
  - host: slskr.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: slskr-api
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: slskr-dashboard
            port:
              number: 80
