apiVersion: v1
kind: Service
metadata:
  name: slskr-api
  namespace: slskr
  labels:
    app: slskr-api
spec:
  type: ClusterIP
  selector:
    app: slskr-api
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: slskr-dashboard
  namespace: slskr
  labels:
    app: slskr-dashboard
spec:
  type: ClusterIP
  selector:
    app: slskr-dashboard
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: slskr-api-nodeport
  namespace: slskr
  labels:
    app: slskr-api
spec:
  type: NodePort
  selector:
    app: slskr-api
  ports:
  - name: http
    port: 8080
    targetPort: http
    nodePort: 30080
    protocol: TCP
