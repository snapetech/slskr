apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: slskr-api
  namespace: slskr
  labels:
    app: slskr-api
    prometheus: "true"
spec:
  selector:
    matchLabels:
      app: slskr-api
  endpoints:
  - port: http
    path: /api/metrics
    interval: 30s
    scrapeTimeout: 10s
    scheme: http
    bearerTokenSecret:
      name: slskr-secrets
      key: SLSKR_API_TOKEN
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
