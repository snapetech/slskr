apiVersion: v1
kind: ConfigMap
metadata:
  name: slskr-config
  namespace: slskr
data:
  SLSKR_LOG_LEVEL: "info"
  SLSKR_HTTP_BIND: "0.0.0.0:8080"
  SLSKR_AUTH_DISABLED: "false"
  SLSKR_SESSION_MAX_IDLE: "300"
  SLSKR_TRANSFER_MAX_ACTIVE: "8"
  SLSKR_SEARCH_RESULT_LIMIT: "100"
  SLSKR_DATABASE_PATH: "/data/slskr.db"
  SLSKR_WEBHOOK_TIMEOUT: "30"
  SLSKR_WEBHOOK_MAX_RETRIES: "3"
