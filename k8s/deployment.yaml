apiVersion: apps/v1
kind: Deployment
metadata:
  name: slskr-api
  namespace: slskr
  labels:
    app: slskr-api
    version: "1.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: slskr-api
  template:
    metadata:
      labels:
        app: slskr-api
        version: "1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: slskr
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: slskr-api
        image: slskr:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        envFrom:
        - configMapRef:
            name: slskr-config
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        volumeMounts:
        - name: data
          mountPath: /data
        - name: cache
          mountPath: /tmp
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      - name: dashboard
        image: node:20-alpine
        ports:
        - name: dashboard
          containerPort: 3000
          protocol: TCP
        envFrom:
        - configMapRef:
            name: slskr-dashboard-config
        workingDir: /app
        command: ["npm"]
        args: ["run", "preview"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: dashboard
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: dashboard
          mountPath: /app
      volumes:
      - name: data
        emptyDir: {}
      - name: cache
        emptyDir: {}
      - name: dashboard
        configMap:
          name: slskr-dashboard-assets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slskr-dashboard-standalone
  namespace: slskr
  labels:
    app: slskr-dashboard
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: slskr-dashboard
  template:
    metadata:
      labels:
        app: slskr-dashboard
        version: "1.0"
    spec:
      containers:
      - name: dashboard
        image: nginx:alpine
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: dashboard-dist
          mountPath: /usr/share/nginx/html
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: dashboard-dist
        configMap:
          name: slskr-dashboard-assets
      - name: nginx-config
        configMap:
          name: slskr-nginx-config
