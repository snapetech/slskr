apiVersion: v1
kind: Secret
metadata:
  name: slskr-secrets
  namespace: slskr
type: Opaque
stringData:
  # Replace every placeholder before applying. Do not commit real values.
  SLSKR_API_TOKEN: "replace-with-random-api-token"
  SLSK_USERNAME: "replace-with-soulseek-username"
  SLSK_PASSWORD: "replace-with-soulseek-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: slskr
type: Opaque
stringData:
  admin-user: "admin"
  admin-password: "replace-with-random-grafana-password"
